<!DOCTYPE html>
<html>

<head>
    <title>AgroMind AI Dashboard</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        .charts{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }
        
        img{
            width:100%;
        }

    </style>

</head>

<body>

    <h1>AgroMind AI Dashboard</h1>

    <div class="charts">

        <div class="card">
            <img src="{{ chart1 }}">
        </div>

        <div class="card">
            <img src="{{ chart2 }}">
        </div>

        <div class="card">
            <img src="{{ chart3 }}">
        </div>

    </div>

</body>

</html>
